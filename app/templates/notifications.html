{% extends "base.html" %}

{% block body %}
  <div>
    {% if notifications %}
    <p>notifications</p>
    <ul>
    {% for notification in notifications %}
      {% for item in notification%}
        <li>{{item}}: {{notification[item]}}</li>
      {% endfor %}
    {% endfor %}
    </ul>
    {% else %}
    <p>No notifications</p>
    {% endif %}
  </div>
{% endblock %}
